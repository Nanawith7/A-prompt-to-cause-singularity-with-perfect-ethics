name: Generate Sitemapxml

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write  

jobs:
  build-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap.xml
        run: |
          mkdir -p docs

          # フロントマター（Jekyllがレイアウトを適用しないようにする）
          echo '---' > docs/sitemap.xml
          echo 'layout: null' >> docs/sitemap.xml
          echo '---' >> docs/sitemap.xml

          # XML宣言とurlset開始
          echo '<?xml version="1.0" encoding="UTF-8"?>' >> docs/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> docs/sitemap.xml

          # globstarを有効化
          shopt -s globstar

          for file in $(git ls-files "docs/**/*.md" "docs/**/*.html"); do
              # docs/_includes/ と docs/_layouts/ 配下を除外
              if [[ "$file" == docs/_includes/* || "$file" == docs/_layouts/* ]]; then
                  continue
              fi

              # docs/ プレフィックスを除去
              public_path="${file#docs/}"
              # .md → .html 変換
              public_path="${public_path%.*}.html"
              # URL構築
              url="https://nanawith7.github.io/A-prompt-to-cause-pseudo-singularity-with-ethics/$public_path"
              # gitから最終更新日を取得
              lastmod=$(git log -1 --format="%cI" -- "$file")

              # 優先度ルール
              if [[ "$public_path" == "index.html" || "$public_path" == "Axiom.html" ]]; then
                priority="1.0"
              elif [[ "$public_path" == *"Reasoning_Fundamental"* ]]; then
                priority="0.9"
              else
                priority="0.8"
              fi

              echo "  <url>" >> docs/sitemap.xml
              echo "    <loc>$url</loc>" >> docs/sitemap.xml
              echo "    <lastmod>$lastmod</lastmod>" >> docs/sitemap.xml
              echo "    <priority>$priority</priority>" >> docs/sitemap.xml
              echo "  </url>" >> docs/sitemap.xml
          done

          echo '</urlset>' >> docs/sitemap.xml

      - name: Commit sitemap.xml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/sitemap.xml
          git commit -m "Update sitemap.xml" || echo "No changes"
          git pull --rebase origin main
          git push
