name: Rename files in docs (recursive)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Rename files recursively
        run: |
          shopt -s globstar nullglob
          for file in docs/**/*; do
            # ディレクトリはスキップ
            if [ -d "$file" ]; then
              continue
            fi

            base=$(basename "$file")
            dir=$(dirname "$file")

            # 半角スペースを _ に置換
            newbase=$(echo "$base" | sed 's/ /_/g')

            if [ "$base" != "$newbase" ]; then
              git mv "$file" "$dir/$newbase"
              echo "Renamed: $file → $dir/$newbase"
            fi
          done

      - name: Commit changes
        run: |
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "Rename files recursively (spaces → underscores)"
            git push
          fi
