name: Rename Folders (spaces в†’ underscores)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-folders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename folders recursively
        run: |
          shopt -s globstar nullglob

          # гѓ•г‚©гѓ«гѓЂг‚’ж·±гЃ„йљЋе±¤гЃ‹г‚‰й †гЃ«е‡¦зђ†пј€жµ…гЃ„й †гЃ гЃЁ rename гЃЊиЎќзЄЃгЃ™г‚‹гЃџг‚Ѓпј‰
          for dir in $(find docs -type d -depth); do
            base=$(basename "$dir")
            parent=$(dirname "$dir")

            # г‚№гѓљгѓјг‚№г‚’ _ гЃ«е¤‰жЏ›
            newbase=$(echo "$base" | sed 's/ /_/g')

            if [ "$base" != "$newbase" ]; then
              newdir="$parent/$newbase"
              echo "Renaming folder: $dir в†’ $newdir"
              git mv "$dir" "$newdir"
            fi
          done

      - name: Commit changes
        run: |
          if git diff --cached --quiet; then
            echo "No folder rename changes."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "Rename folders (spaces в†’ underscores)"
            git push
          fi
